<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Statement</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; background: #1a1a1a; overflow: hidden; }
  .stage { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .slide {
    width: 1920px; height: 1080px;
    background: var(--ut-canvas);
    position: relative;
    flex-shrink: 0;
    transform-origin: center;
  }
  .slide.dark { background: var(--ut-ink-strong); color: #fff; }

  /* Common anchors */
  .eyebrow {
    position: absolute; top: 96px; left: 120px;
    display: inline-flex; align-items: center; gap: 18px;
    font-size:32px; line-height: 1;
  }
  .eyebrow .num {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--ut-ink);
    font-variant-numeric: tabular-nums;
  }
  .eyebrow .sep {
    width: 1px; height: 20px;
    background: var(--ut-line-strong);
  }
  .eyebrow .title {
    font-weight: 500;
    color: var(--ut-text-soft);
    letter-spacing: -0.005em;
  }
  .page-marker {
    position: absolute; bottom: 48px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 22px; font-weight: 500;
    color: var(--ut-text-muted);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
  </style>
<script>
  // Auto-scale slide to fit viewport
  function fit() {
    const s = document.querySelector('.slide');
    if (!s) return;
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const k = Math.min(sx, sy);
    s.style.transform = 'scale(' + k + ')';
  }
  window.addEventListener('load', fit);
  window.addEventListener('resize', fit);
</script>
</head>
<body><div class="stage">
<div class="slide">
  <div class="eyebrow"><span class="num">03</span><span class="sep"></span><span class="title">RAG의 기본 구조</span></div>
  <div style="position:absolute;left:120px;top:50%;transform:translateY(-50%);max-width:1440px;">
    <div style="font-size:120px;font-weight:700;letter-spacing:-0.03em;line-height:1.1;color:var(--ut-ink-strong);">
      RAG는 정말<br/><span style="color:var(--ut-accent);">죽었는가</span>
    </div>
  </div>
  <div class="page-marker"><span>Copyright © 2026 uture(유쳐) by 아이솔. All rights reserved.</span><span>07 / 36</span></div>
</div>
</div></body></html>
