<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Comparison</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; background: #1a1a1a; overflow: hidden; }
  .stage { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .slide {
    width: 1920px; height: 1080px;
    background: var(--ut-canvas);
    position: relative;
    flex-shrink: 0;
    transform-origin: center;
  }
  .slide.dark { background: var(--ut-ink-strong); color: #fff; }

  /* Common anchors */
  .eyebrow {
    position: absolute; top: 96px; left: 120px;
    display: inline-flex; align-items: center; gap: 18px;
    font-size:32px; line-height: 1;
  }
  .eyebrow .num {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--ut-ink);
    font-variant-numeric: tabular-nums;
  }
  .eyebrow .sep {
    width: 1px; height: 20px;
    background: var(--ut-line-strong);
  }
  .eyebrow .title {
    font-weight: 500;
    color: var(--ut-text-soft);
    letter-spacing: -0.005em;
  }
  .page-marker {
    position: absolute; bottom: 48px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 22px; font-weight: 500;
    color: var(--ut-text-muted);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
  .page-num {
    position: absolute; bottom: 48px; right: 120px;
    font-size: 22px; font-weight: 500;
    color: var(--ut-text-muted);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
  </style>
<script>
  // Auto-scale slide to fit viewport
  function fit() {
    const s = document.querySelector('.slide');
    if (!s) return;
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const k = Math.min(sx, sy);
    s.style.transform = 'scale(' + k + ')';
  }
  window.addEventListener('load', fit);
  window.addEventListener('resize', fit);
</script>
</head>
<body><div class="stage">
<div class="slide">
  <div class="eyebrow"><span class="num">05</span><span class="sep"></span><span class="title">어디에 무엇을 쓰나</span></div>
  <div style="position:absolute;left:120px;top:200px;width:1680px;">
    <div style="font-size:64px;font-weight:700;letter-spacing:-0.02em;line-height:1.15;color:var(--ut-ink);margin-bottom:64px;">
      세 가지 선택지, 같은 도메인
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;">
      <div style="background:#fff;border:1px solid var(--ut-line);border-radius:12px;padding:48px;">
        <div style="font-size:26px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:24px;">파인튜닝</div>
        <div style="font-size:32px;font-weight:600;line-height:1.3;color:var(--ut-ink);margin-bottom:24px;">모델을 재학습한다</div>
        <div style="font-size:30px;line-height:1.55;color:var(--ut-text-soft);">도메인 데이터를 모델 가중치에 직접 새긴다. 비용↑ · 유연성↓</div>
      </div>
      <div style="background:#fff;border:1.5px solid var(--ut-accent);border-radius:12px;padding:48px;">
        <div style="font-size:26px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-accent);margin-bottom:24px;">RAG</div>
        <div style="font-size:32px;font-weight:600;line-height:1.3;color:var(--ut-ink);margin-bottom:24px;"><span style="color:var(--ut-accent);">검색</span>으로 보강한다</div>
        <div style="font-size:30px;line-height:1.55;color:var(--ut-text-soft);">필요한 문서를 그때그때 찾아 프롬프트에 끼워 넣는다. 갱신이 쉽다.</div>
      </div>
      <div style="background:#fff;border:1px solid var(--ut-line);border-radius:12px;padding:48px;">
        <div style="font-size:26px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:24px;">프롬프트</div>
        <div style="font-size:32px;font-weight:600;line-height:1.3;color:var(--ut-ink);margin-bottom:24px;">지시문만 다듬는다</div>
        <div style="font-size:30px;line-height:1.55;color:var(--ut-text-soft);">모델 외부 변경 없음. 짧은 컨텍스트에 강하고, 긴 문서엔 약하다.</div>
      </div>
    </div>
  </div>
<div class="page-num">15 / 36</div>
</div>
</div></body></html>
