<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Cover · UTURE</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; background: #1a1a1a; overflow: hidden; }
  .stage { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .slide {
    width: 1920px; height: 1080px;
    background: var(--ut-canvas);
    position: relative;
    flex-shrink: 0;
    transform-origin: center;
  }
  .slide.dark { background: var(--ut-ink-strong); color: #fff; }

  /* Common anchors */
  .eyebrow {
    position: absolute; top: 96px; left: 120px;
    display: inline-flex; align-items: center; gap: 18px;
    font-size:32px; line-height: 1;
  }
  .eyebrow .num {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--ut-ink);
    font-variant-numeric: tabular-nums;
  }
  .eyebrow .sep {
    width: 1px; height: 20px;
    background: var(--ut-line-strong);
  }
  .eyebrow .title {
    font-weight: 500;
    color: var(--ut-text-soft);
    letter-spacing: -0.005em;
  }
  .page-marker {
    position: absolute; bottom: 48px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 22px; font-weight: 500;
    color: var(--ut-text-muted);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
  </style>
<script>
  // Auto-scale slide to fit viewport
  function fit() {
    const s = document.querySelector('.slide');
    if (!s) return;
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const k = Math.min(sx, sy);
    s.style.transform = 'scale(' + k + ')';
  }
  window.addEventListener('load', fit);
  window.addEventListener('resize', fit);
</script>
</head>
<body><div class="stage">
<div class="slide">
  <div style="position:absolute;top:96px;right:120px;display:flex;flex-direction:column;align-items:flex-end;gap:20px;">
    <img src="../assets/uture_logo.png" style="width:104px;height:104px;display:block;object-fit:contain;" alt="UTURE 브랜드 마크"/>
    <img src="../assets/uture_text_logo.png" style="height:36px;width:auto;display:block;object-fit:contain;" alt="uture"/>
  </div>

  <div style="position:absolute;left:120px;top:340px;width:1200px;">
    <div style="display:inline-flex;align-items:center;gap:18px;font-size:30px;line-height:1;margin-bottom:56px;color:var(--ut-text-soft);">
        <span style="font-weight:500;letter-spacing:-0.005em;">RAG 입문</span>
        <span style="width:1px;height:18px;background:var(--ut-line-strong);"></span>
        <span style="font-family:var(--font-mono);font-weight:600;color:var(--ut-ink);font-variant-numeric:tabular-nums;">1회차</span>
      </div>
    <h1 style="font-size:140px;font-weight:700;letter-spacing:-0.035em;line-height:1.02;color:var(--ut-ink-strong);margin:0 0 32px;">
      검색이 답을<br/>거든다
    </h1>
    <div style="font-size:36px;font-weight:500;letter-spacing:-0.015em;color:var(--ut-text-soft);line-height:1.4;max-width:900px;">
      RAG의 구조와 한계, 그리고 청킹·임베딩이라는<br/>두 개의 기본기를 정리한다
    </div>
  </div>

  <div style="position:absolute;left:120px;bottom:96px;display:flex;align-items:baseline;">
    <div>
      <div style="font-size:22px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:8px;">강사</div>
      <div style="font-size:30px;font-weight:600;color:var(--ut-ink);">uture | 유쳐 교육팀</div>
    </div>
  </div>

  <div style="position:absolute;right:120px;bottom:48px;font-size:22px;font-weight:500;color:var(--ut-text-muted);letter-spacing:0.02em;">Copyright © 2026 uture(유쳐) by 아이솔. All rights reserved.</div>
</div>
</div></body></html>
