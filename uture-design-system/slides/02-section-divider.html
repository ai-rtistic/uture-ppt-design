<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Section · 03</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; background: #1a1a1a; overflow: hidden; }
  .stage { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .slide {
    width: 1920px; height: 1080px;
    background: var(--ut-canvas);
    position: relative;
    flex-shrink: 0;
    transform-origin: center;
  }
  .slide.dark { background: var(--ut-ink-strong); color: #fff; }

  /* Common anchors */
  .eyebrow {
    position: absolute; top: 96px; left: 120px;
    display: inline-flex; align-items: center; gap: 18px;
    font-size:32px; line-height: 1;
  }
  .eyebrow .num {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--ut-ink);
    font-variant-numeric: tabular-nums;
  }
  .eyebrow .sep {
    width: 1px; height: 20px;
    background: var(--ut-line-strong);
  }
  .eyebrow .title {
    font-weight: 500;
    color: var(--ut-text-soft);
    letter-spacing: -0.005em;
  }
  .page-marker {
    position: absolute; bottom: 48px; left: 120px; right: 120px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 22px; font-weight: 500;
    color: var(--ut-text-muted);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
  </style>
<script>
  // Auto-scale slide to fit viewport
  function fit() {
    const s = document.querySelector('.slide');
    if (!s) return;
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const k = Math.min(sx, sy);
    s.style.transform = 'scale(' + k + ')';
  }
  window.addEventListener('load', fit);
  window.addEventListener('resize', fit);
</script>
</head>
<body><div class="stage">
<div class="slide dark">
  <img src="../assets/uture_logo.png" style="position:absolute;top:96px;right:120px;width:64px;height:64px;object-fit:contain;filter:invert(1);" alt="UTURE 브랜드 마크"/>
  <!-- 인쇄 안전 패턴 A: 고정 top. README § 5 Print-safe positioning 참고. -->
  <div style="position:absolute;left:120px;top:200px;right:120px;">
    <div style="font-size:36px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:48px;">Section</div>
    <div style="font-size:280px;font-weight:700;letter-spacing:-0.04em;line-height:0.95;color:#fff;">03</div>
    <div style="font-size:72px;font-weight:700;letter-spacing:-0.025em;color:rgba(255,255,255,0.7);margin-top:24px;">RAG의 기본 구조</div>
    <div style="height:4px;width:96px;background:var(--ut-accent);margin-top:48px;"></div>
  </div>
  <div style="position:absolute;bottom:96px;left:120px;right:120px;display:flex;justify-content:space-between;align-items:baseline;font-size:26px;color:rgba(255,255,255,0.5);font-family:var(--font-sans);letter-spacing:0.02em;font-weight:500;"><span>Copyright © 2026 uture(유쳐) by 아이솔. All rights reserved.</span><span>04 / 14</span></div>
</div>
</div></body></html>
