<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:260px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
</style></head><body>
<div class="card-label">Radii · 모서리</div>
<div style="display:flex;gap:32px;align-items:flex-end;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div style="width:96px;height:96px;background:var(--ut-surface-1);border:1px solid var(--ut-line);border-radius:8px;"></div>
    <div style="font-family:var(--font-mono);font-size:12px;font-weight:600;">--r-sm</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--ut-text-muted);">8 · 아이콘 박스</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div style="width:96px;height:96px;background:var(--ut-surface-1);border:1px solid var(--ut-line);border-radius:12px;"></div>
    <div style="font-family:var(--font-mono);font-size:12px;font-weight:600;">--r-md</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--ut-text-muted);">12 · 카드</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div style="width:140px;height:48px;background:var(--ut-canvas);border:1.5px solid var(--ut-accent);border-radius:999px;display:flex;align-items:center;justify-content:center;color:var(--ut-accent);font-weight:600;font-size:14px;">Embedding</div>
    <div style="font-family:var(--font-mono);font-size:12px;font-weight:600;">--r-pill</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--ut-text-muted);">999 · 칩</div>
  </div>
</div>
</body></html>
