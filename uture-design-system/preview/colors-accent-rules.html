<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:340px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.sw{display:flex;flex-direction:column;gap:8px;}
.sw .chip{width:100%;aspect-ratio:1/1;border-radius:8px;border:1px solid var(--ut-line);}
.sw .name{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ut-ink);line-height:1.3;}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--ut-text-muted);}
</style></head><body>
<div class="card-label">Accent Usage · 주황은 사건이다</div>
<div style="display:flex;flex-direction:column;gap:12px;font-size:14px;line-height:1.55;color:var(--ut-ink);">
  <div style="display:flex;gap:14px;"><span style="color:var(--ut-accent);font-weight:700;font-family:var(--font-mono);width:24px;">01</span><div><b>핵심 키워드</b> — 슬라이드당 <span style="color:var(--ut-accent);font-weight:600">한 개</span></div></div>
  <div style="display:flex;gap:14px;"><span style="color:var(--ut-accent);font-weight:700;font-family:var(--font-mono);width:24px;">02</span><div><b>단계 번호</b> — Step 01, 02…</div></div>
  <div style="display:flex;gap:14px;"><span style="color:var(--ut-accent);font-weight:700;font-family:var(--font-mono);width:24px;">03</span><div><b>다이어그램</b> — 강조 노드 1개 / 화살표 흐름</div></div>
  <div style="display:flex;gap:14px;"><span style="color:var(--ut-accent);font-weight:700;font-family:var(--font-mono);width:24px;">04</span><div><b>페이지 마커 도트</b> — eyebrow 앞 8px 점</div></div>
  <div style="margin-top:6px;padding:12px 16px;background:var(--ut-surface-2);border-radius:8px;font-size:13px;color:var(--ut-text-soft);">그 외에는 사용 금지. 보색·삼색 배합 금지.</div>
</div>
</body></html>
