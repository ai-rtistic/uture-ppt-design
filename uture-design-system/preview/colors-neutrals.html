<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:320px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.sw{display:flex;flex-direction:column;gap:8px;}
.sw .chip{width:100%;aspect-ratio:1/1;border-radius:8px;border:1px solid var(--ut-line);}
.sw .name{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ut-ink);line-height:1.3;}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--ut-text-muted);}
</style></head><body>
<div class="card-label">Neutrals · 회색 위계 4단계</div>
<div class="swatch-grid" style="grid-template-columns:repeat(6,1fr);">
  <div class="sw"><div class="chip" style="background:#fafafa;"></div><div class="name">surface-1</div><div class="hex">#FAFAFA</div></div>
  <div class="sw"><div class="chip" style="background:#f5f5f3;"></div><div class="name">surface-2</div><div class="hex">#F5F5F3</div></div>
  <div class="sw"><div class="chip" style="background:#d8d5ce;border-color:#d8d5ce;"></div><div class="name">line</div><div class="hex">#D8D5CE</div></div>
  <div class="sw"><div class="chip" style="background:#aeaba2;border-color:#aeaba2;"></div><div class="name">line-strong</div><div class="hex">#AEABA2</div></div>
  <div class="sw"><div class="chip" style="background:#77736b;border-color:#77736b;"></div><div class="name">text-muted</div><div class="hex">#77736B</div></div>
  <div class="sw"><div class="chip" style="background:#36342e;border-color:#36342e;"></div><div class="name">text-soft</div><div class="hex">#36342E</div></div>
</div>
<div style="margin-top:20px;font-size:12px;color:var(--ut-text-muted);line-height:1.5;">ink → text-soft → text-muted → line. 5번째 회색은 만들지 않는다.</div>
</body></html>
