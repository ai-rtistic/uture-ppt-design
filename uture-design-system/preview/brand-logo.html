<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { background: var(--ut-canvas); margin: 0; }
  body {
    width: 700px; height: 280px;
    box-sizing: border-box;
    padding: 40px 48px;
    display: flex; align-items: center; gap: 48px;
    font-family: var(--font-sans);
  }
  .mark { width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .mark img { width: 100%; height: 100%; object-fit: contain; }
  .text-mark { flex: 1; max-width: 400px; }
  .text-mark img { width: 100%; height: auto; display: block; }
  .meta { margin-top: 16px; font-size: 14px; font-weight: 500; color: var(--ut-text-muted); letter-spacing: 0.01em; }
</style>
</head>
<body>
  <div class="mark"><img src="../assets/uture-logo.svg" alt="UTURE mark"/></div>
  <div class="text-mark">
    <img src="../assets/uture-text-logo.svg" alt="유쳐 wordmark"/>
    <div class="meta">uture(유쳐) · AX Agency</div>
  </div>
</body>
</html>
