<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:280px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.sw{display:flex;flex-direction:column;gap:8px;}
.sw .chip{width:100%;aspect-ratio:1/1;border-radius:8px;border:1px solid var(--ut-line);}
.sw .name{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ut-ink);line-height:1.3;}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--ut-text-muted);}
</style></head><body>
<div class="card-label">Semantic · 의미 컬러 (선택적)</div>
<div class="swatch-grid" style="grid-template-columns:repeat(6,1fr);">
  <div class="sw"><div class="chip" style="background:#1f6b4a;border-color:#1f6b4a;"></div><div class="name">good</div><div class="hex">#1F6B4A</div></div>
  <div class="sw"><div class="chip" style="background:#eaf3ee;"></div><div class="name">good-bg</div><div class="hex">#EAF3EE</div></div>
  <div class="sw"><div class="chip" style="background:#8a3a2a;border-color:#8a3a2a;"></div><div class="name">bad</div><div class="hex">#8A3A2A</div></div>
  <div class="sw"><div class="chip" style="background:#f4ece8;"></div><div class="name">bad-bg</div><div class="hex">#F4ECE8</div></div>
  <div class="sw"><div class="chip" style="background:#2a4e8a;border-color:#2a4e8a;"></div><div class="name">info</div><div class="hex">#2A4E8A</div></div>
  <div class="sw"><div class="chip" style="background:#ecf0f7;"></div><div class="name">info-bg</div><div class="hex">#ECF0F7</div></div>
</div>
<div style="margin-top:16px;font-size:12px;color:var(--ut-text-muted);line-height:1.5;">Before/After 비교에만. 그 슬라이드의 주황은 줄인다.</div>
</body></html>
