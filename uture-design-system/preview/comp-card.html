<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:280px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
</style></head><body>
<div class="card-label">Comparison Card · 비교 카드</div>
<div style="display:flex;gap:16px;">
  <div style="flex:1;background:var(--ut-canvas);border:1px solid var(--ut-line);border-radius:12px;padding:20px;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:10px;">파인튜닝</div>
    <div style="font-size:15px;line-height:1.55;color:var(--ut-text-soft);">모델 가중치를 도메인 데이터로 다시 학습</div>
  </div>
  <div style="flex:1;background:var(--ut-canvas);border:1px solid var(--ut-line);border-radius:12px;padding:20px;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:10px;">RAG</div>
    <div style="font-size:15px;line-height:1.55;color:var(--ut-text-soft);"><span style="color:var(--ut-accent);font-weight:600;">검색</span>한 문서를 프롬프트에 끼워 응답</div>
  </div>
  <div style="flex:1;background:var(--ut-canvas);border:1px solid var(--ut-line);border-radius:12px;padding:20px;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:10px;">프롬프트</div>
    <div style="font-size:15px;line-height:1.55;color:var(--ut-text-soft);">모델 외부 변경 없이 지시문으로 제어</div>
  </div>
</div>
</body></html>
