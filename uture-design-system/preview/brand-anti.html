<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:340px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.sw{display:flex;flex-direction:column;gap:8px;}
.sw .chip{width:100%;aspect-ratio:1/1;border-radius:8px;border:1px solid var(--ut-line);}
.sw .name{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ut-ink);line-height:1.3;}
.sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--ut-text-muted);}
</style></head><body>
<div class="card-label">Never · 절대 하지 않는 것</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 32px;font-size:14px;color:var(--ut-ink);line-height:1.7;flex:1;">
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 그라데이션 · 그림자 · 광택</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 풀블리드 사진 · 스톡 이미지</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 의미 없는 장식 아이콘</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 이모지 (본문/시각 모두)</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 3가지 이상 강조 색</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 영상 썸네일 톤</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 캐릭터 · 3D 일러스트</div>
  <div><span style="display:inline-block;width:14px;color:var(--ut-bad);font-weight:700;">×</span> 백드롭 블러 · 글래스</div>
</div>
</body></html>
