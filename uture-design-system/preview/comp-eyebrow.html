<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:260px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
.eb{display:inline-flex;align-items:center;gap:14px;line-height:1;}
.eb .num{font-family:var(--font-mono);font-weight:600;color:var(--ut-ink);font-variant-numeric:tabular-nums;}
.eb .sep{width:1px;background:var(--ut-line-strong);}
.eb .title{font-weight:500;color:var(--ut-text-soft);letter-spacing:-0.005em;}
.eb-md{font-size:16px;}
.eb-md .num{font-size:16px;}
.eb-md .sep{height:14px;}
.eb-lg{font-size:22px;}
.eb-lg .num{font-size:22px;}
.eb-lg .sep{height:18px;}
</style></head><body>
<div class="card-label">Eyebrow · 챕터 라벨 (좌상단 고정)</div>
<div style="display:flex;flex-direction:column;gap:24px;margin-top:6px;">
  <div class="eb eb-md"><span class="num">03</span><span class="sep"></span><span class="title">RAG의 기본 구조</span></div>
  <div class="eb eb-md"><span class="num">07</span><span class="sep"></span><span class="title">청킹 전략</span></div>
  <div class="eb eb-lg"><span class="num">12</span><span class="sep"></span><span class="title">평가와 한계</span></div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--ut-text-muted);margin-top:8px;line-height:1.5;">mono 번호 + 1px 세로선 + Pretendard 500 · 대문자 트래킹 / 색 강조 없음</div>
</div>
</body></html>
