<!doctype html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/><style>
html,body{background:var(--ut-canvas);margin:0;}
body{width:700px;height:360px;box-sizing:border-box;padding:32px 40px;font-family:var(--font-sans);color:var(--ut-ink);display:flex;flex-direction:column;}
.card-label{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ut-text-muted);margin-bottom:18px;}
.spec-row{display:flex;align-items:baseline;gap:24px;border-top:1px solid var(--ut-line);padding:14px 0;}
.spec-row:first-of-type{border-top:none;padding-top:0;}
.spec-meta{font-family:var(--font-mono);font-size:11px;color:var(--ut-text-muted);min-width:120px;letter-spacing:0;}
.spec-sample{flex:1;color:var(--ut-ink);}
</style></head><body>
<div class="card-label">Titles · 본문 슬라이드 제목</div>
<div class="spec-row">
  <div class="spec-meta">title-2<br/>56 / 1.2 · 700</div>
  <div class="spec-sample" style="font-size:38px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;">인베딩: 텍스트를 숫자 위치로</div>
</div>
<div class="spec-row">
  <div class="spec-meta">title-3<br/>40 / 1.25 · 600</div>
  <div class="spec-sample" style="font-size:28px;font-weight:600;letter-spacing:-0.015em;line-height:1.25;">검색 단계의 두 가지 한계</div>
</div>
</body></html>
